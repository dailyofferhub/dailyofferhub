<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAILY OFFER HUB</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.image-container{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border-radius:10px;
}
.image-container img{
width:100%;
height:100%;
object-fit:contain;
transition:transform 0.25s ease;
cursor:zoom-in;
}
</style>

</head>

<body class="bg-gray-100 p-6">

<!-- IMPORTANT: NO max-width, NO mx-auto -->
<div id="product-grid" class="w-full"></div>

<script src="app.js"></script>

</body>
</html>
