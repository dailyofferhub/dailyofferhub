<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAILY OFFER HUB | Premium Deals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
fontFamily:{ sans:['Inter','sans-serif'] },
colors:{
brand:{50:'#f0f9ff',500:'#0ea5e9',600:'#0284c7',900:'#0c4a6e'},
amazon:'#FF9900'
}
}
}
}
</script>

<style>
.glass-nav{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
}

.hero-gradient{
background:linear-gradient(135deg,#1e293b 0%,#0369a1 100%);
}

.image-container{
position:relative;
width:100%;
aspect-ratio:1/1;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
}

.image-container img{
width:100%;
height:100%;
object-fit:contain;
object-position:center;
cursor:zoom-in;
display:block;
transition:transform 0.25s ease;
}
</style>

</head>

<body class="bg-gray-50 text-gray-800 font-sans">

<!-- NAVBAR -->
<nav class="fixed w-full z-50 glass-nav shadow-sm border-b border-gray-100">
<div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">

<div class="flex items-center">
<img src="image/logo.jpeg.jpeg" class="h-10 w-10 mr-2">
<span class="font-bold text-2xl">
DAILY<span class="text-brand-600">OFFER HUB</span>
</span>
</div>

<button onclick="showAbout()" class="text-gray-700 hover:text-brand-600">
About us
</button>

</div>
</nav>

<!-- HERO -->
<header class="hero-gradient pt-24 pb-16 text-center text-white">
<h1 class="text-4xl md:text-6xl font-extrabold mb-6">
Top Picks Just For You
</h1>
<p class="text-lg max-w-2xl mx-auto">
Compare and buy from Amazon directly from our curated list.
</p>
</header>

<!-- PRODUCTS -->
<main class="max-w-7xl mx-auto px-4 py-12">
<h2 class="text-3xl font-bold text-center mb-8">Featured Products</h2>

<div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
</main>

<!-- ABOUT -->
<section id="about-section" style="display:none;" class="bg-white py-12">
<div class="max-w-4xl mx-auto text-center px-6">

<h2 class="text-3xl font-bold mb-4">About us</h2>

<p class="text-gray-600">
We help you find the best products with real value.
</p>

<p class="text-xs text-gray-400 mt-4">
As an Amazon Associate, we earn from qualifying purchases.
</p>

</div>
</section>

<script src="app.js"></script>

</body>
</html>
